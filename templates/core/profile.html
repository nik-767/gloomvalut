<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ profile.user.username|title }}'s Profile</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'core/styles.css' %}">
</head>
<body>
    <div class="page-wrapper">
        <div class="profile-card">
            <h1 class="profile-title">{{ profile.user.username|title }}</h1>
            
            <div class="profile-meta">
                <span>User Profile</span>
                <span class="meta-dot"></span>
                <span>Member since {{ profile.created|date:"M Y" }}</span>
            </div>

            <div class="avatar-wrapper">
                {% if profile.pic %}
                    <div class="avatar-container">
                        <img src="{{ profile.pic.url }}" class="profile-pic">
                    </div>
                {% endif %}
            </div>

            <div class="profile-bio-section">
                {% if profile.bio %}
                    <p class="profile-bio">{{ profile.bio }}</p>
                {% else %}
                    <p class="profile-bio empty">No bio written yet.</p>
                {% endif %}
            </div>

            <div class="profile-actions">
                <a href="{% url 'Profile_upd' %}">update profile</a>
                <a href="{% url 'home' %}" class="back-home-btn">Back to Home</a>
            </div>
        </div>
    </div>
</body>
</html>
